stages:
  - build

build_job:
  stage: build
  image: python:3.10

  services:
    - docker:dind

  variables:
    DOCKER_TLS_CERTDIR: ""

  before_script:
    - apt-get update
    - apt-get install -y docker.io

  script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest
    - pytest -v
    - docker build -t flask-benchmark .
